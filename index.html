<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mine Ruins Duel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <header id="hud" class="hud">
      <div class="hud-left">
        <span id="hud-round">Раунд 1 / 5</span>
        <span id="hud-phase">Бой</span>
        <span id="hud-hp" class="hud-hp">❤️ 100 / 100</span>
      </div>
      <div class="hud-center">
        <span id="hud-timer" class="hud-timer">5:00</span>
      </div>
      <div class="hud-right">
        <span id="hud-score">Побед: 0</span>
        <span id="hud-seed" class="hud-seed">Seed: —</span>
      </div>
    </header>

    <div id="class-overlay" class="overlay">
      <div class="modal">
        <h1>⛏️ Mine Ruins Duel</h1>
        <p class="subtitle">Solo · магазин · аура · бластер · детонатор</p>
        <div id="class-select-content"></div>
      </div>
    </div>

    <div id="shop-overlay" class="overlay hidden">
      <div class="modal modal-wide">
        <div id="shop-content"></div>
      </div>
    </div>

    <div id="results-overlay" class="overlay hidden">
      <div class="modal modal-compact">
        <div id="results-content"></div>
      </div>
    </div>

    <div id="intermission-overlay" class="overlay hidden">
      <div class="modal">
        <h2>⏸ Перерыв между раундами</h2>
        <p>Рюкзак сохраняется · HP сбрасывается</p>
        <p class="intermission-timer">Следующий раунд через <strong id="intermission-timer">30</strong>с</p>
        <div id="intermission-content" class="intermission-grid"></div>
      </div>
    </div>

    <div id="match-end-overlay" class="overlay hidden">
      <div class="modal">
        <div id="match-end-content"></div>
      </div>
    </div>

    <div id="backpack-overlay" class="overlay hidden">
      <div class="modal modal-compact">
        <div id="backpack-content"></div>
      </div>
    </div>
  </div>

  <script src="core/constants.js"></script>
  <script src="core/items.js"></script>
  <script src="systems/display.js"></script>
  <script src="core/rng.js"></script>
  <script src="core/collision.js"></script>
  <script src="core/map-gen.js"></script>
  <script src="core/game-state.js"></script>
  <script src="entities/player.js"></script>
  <script src="entities/projectile.js"></script>
  <script src="entities/effects.js"></script>
  <script src="entities/bomb.js"></script>
  <script src="entities/mob.js"></script>
  <script src="systems/camera.js"></script>
  <script src="systems/gamepad.js"></script>
  <script src="systems/input.js"></script>
  <script src="systems/shop.js"></script>
  <script src="systems/fog.js"></script>
  <script src="systems/render.js"></script>
  <script src="game.js"></script>
</body>
</html>
